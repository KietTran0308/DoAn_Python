<style>
    .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .tb-left {
        display: flex;
        gap: 10px;
        flex-grow: 1;
        margin-right: 20px;
        height: 40px;
    }

    .tb-right {
        display: flex;
        align-items: center;
    }

    .toolbar input {
        width: 25vw;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font: normal 18px 'Merriweather', sans-serif;
    }

    .toolbar select {
        width: 10vw;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font: normal 18px 'Merriweather', sans-serif;
    }

    .add-btn {
        padding: 8px 15px;
        background-color: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        font: bold 18px 'Merriweather', sans-serif;
        height: 40px;
    }

    .pagination {
        margin-top: 20px;
        text-align: center;
    }

    .pagination span {
        display: inline-block;
        padding: 5px 10px;
        margin: 0 3px;
        background-color: white;
        border: 1px solid #ccc;
        cursor: pointer;
        border-radius: 3px;
    }

    .pagination .active {
        background-color: #e0e0e0;
    }
</style>

<div class="toolbar">
    <div class="tb-left">
         <input type="text" placeholder="Tìm theo mã, tên, số điện thoại...">
        <select><option>Tất cả danh mục</option></select>
        <select><option>Tất cả trạng thái</option></select>
    </div>
    <div class="tb-right">
        <button class="add-btn">+ Thêm SK</button>
    </div>
</div>

<div class="reusable-table-container">
    <table class="data-table">
        <thead>
            <tr>
                <th>Tên sự kiện</th>
                <th>Ngày tổ chức</th>
                <th>Địa điểm</th>
                <th>Vé đã bán</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="event-table-body">
        </tbody>
    </table>
</div>

<div class="pagination" id="event-pagination"> </div>
