<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Check-in</title>
    <style>
        /* Tận dụng lại các style dùng chung của hệ thống */
        .reusable-table-container { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); overflow: hidden; margin-top: 20px;}
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px;}
        .data-table th { background-color: #f8f9fa; font-weight: bold; color: #262532; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: inline-block; text-align: center;}
        .badge-success { background: #d4edda; color: #28a745; }
        .badge-danger { background: #f8d7da; color: #dc3545; }
        .badge-info { background: #cce5ff; color: #17a2b8; }
        .pagination { display: flex; gap: 5px; margin-top: 20px; justify-content: flex-end; }
    </style>
</head>
<body style="background: #f4f7f6; padding: 20px; margin: 0; font-family: Arial, sans-serif;">

    <div class="toolbar" style="background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
        <div class="tb-left" style="display: flex; gap: 15px; align-items: center; flex: 1;">
            <search-box id="search-log" placeholder="Tìm mã vé, QR Code..."></search-box>

            <select id="filter-event" style="padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; max-width: 200px;">
                <option value="">-- Tất cả sự kiện --</option>
            </select>

            <select id="filter-gate" style="padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; outline: none;">
                <option value="">-- Tất cả cổng --</option>
            </select>

            <select id="filter-status" style="padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; outline: none;">
                <option value="">-- Tất cả trạng thái --</option>
                <option value="1">Thành công (Hợp lệ)</option>
                <option value="0">Thất bại (Từ chối)</option>
            </select>
        </div>
        <div class="tb-right" style="display: flex; gap: 15px; align-items: center;">
            <button style="background: #28a745; color: white; padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
                📥 Xuất Excel
            </button>
        </div>
    </div>

    <div class="reusable-table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 160px;">Thời Gian</th>
                    <th style="width: 150px;">Mã QR / ID Vé</th>
                    <th>Sự Kiện</th>
                    <th style="width: 120px;">Cổng Quét</th>
                    <th style="width: 80px; text-align: center;">Loại</th>
                    <th style="width: 180px;">NV Soát Vé</th>
                    <th style="width: 120px; text-align: center;">Trạng Thái</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                </tbody>
        </table>
    </div>

    <div class="pagination" id="log-pagination"></div>

    <script src="CN52_LichSuCheckin.js"></script>
</body>
</html>
