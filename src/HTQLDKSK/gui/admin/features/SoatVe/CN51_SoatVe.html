<div style="display: flex; gap: 20px; height: 100%; overflow: hidden;">

    <!-- Cột trái: Quét vé -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 16px;">

        <!-- Card quét QR -->
        <div style="background: #1e1d2e; border-radius: 12px; padding: 24px; border: 1px solid #3a3850;">
            <h2 style="color: #80ceff; font-family: 'Space Grotesk', sans-serif; margin-bottom: 20px; font-size: 18px;">
                📷 Quét Mã QR
            </h2>

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div>
                    <label style="color: rgba(255,255,255,0.6); font-size: 13px; display: block; margin-bottom: 6px;">MÃ QR / NHẬP THỦ CÔNG</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="qr-input"
                               placeholder="Quét hoặc nhập mã QR..."
                               style="flex: 1; background: #262532; border: 1px solid #3a3850; color: white;
                                      padding: 10px 14px; border-radius: 8px; font-size: 15px; outline: none;"
                               onkeydown="if(event.key==='Enter') submitQR()">
                        <button onclick="submitQR()" id="scan-btn"
                                style="background: #6a95b8; color: white; border: none; padding: 10px 20px;
                                       border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;
                                       white-space: nowrap;">
                            ✔ Xác nhận
                        </button>
                    </div>
                </div>

                <div>
                    <label style="color: rgba(255,255,255,0.6); font-size: 13px; display: block; margin-bottom: 6px;">CỔng VÀO</label>
                    <select id="ten-cong"
                            style="width: 100%; background: #262532; border: 1px solid #3a3850; color: white;
                                   padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;">
                        <option value="Cổng 1">Cổng 1</option>
                        <option value="Cổng 2">Cổng 2</option>
                        <option value="Cổng VIP">Cổng VIP</option>
                        <option value="Cổng Chính">Cổng Chính</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Kết quả quét -->
        <div id="scan-result-card"
             style="background: #1e1d2e; border-radius: 12px; padding: 24px; border: 1px solid #3a3850; flex: 1;">
            <div id="scan-result-content" style="height: 100%; display: flex; align-items: center; justify-content: center;">
                <div style="text-align: center; color: rgba(255,255,255,0.3);">
                    <div style="font-size: 48px; margin-bottom: 12px;">🎫</div>
                    <div style="font-size: 14px;">Kết quả kiểm tra vé hiển thị ở đây</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cột phải: Lịch sử -->
    <div style="flex: 1.4; display: flex; flex-direction: column; background: #1e1d2e; border-radius: 12px;
                border: 1px solid #3a3850; overflow: hidden;">

        <!-- Header lịch sử -->
        <div style="padding: 20px 24px; border-bottom: 1px solid #3a3850; display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
            <h2 style="color: #80ceff; font-family: 'Space Grotesk', sans-serif; font-size: 18px; flex: 1;">
                📋 Lịch Sử Check-in
            </h2>
            <select id="filter-su-kien"
                    style="background: #262532; border: 1px solid #3a3850; color: white;
                           padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none;"
                    onchange="loadLichSu()">
                <option value="">-- Chọn sự kiện --</option>
            </select>
            <button onclick="loadLichSu()"
                    style="background: #262532; border: 1px solid #3a3850; color: #80ceff;
                           padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;">
                🔄
            </button>
        </div>

        <!-- Thống kê nhanh -->
        <div id="stats-bar" style="display: none; padding: 12px 24px; gap: 16px; border-bottom: 1px solid #3a3850;
                                    background: #262532; flex-shrink: 0; flex-wrap: wrap;">
            <span id="stat-total" style="color: rgba(255,255,255,0.7); font-size: 13px;"></span>
            <span id="stat-success" style="color: #4caf50; font-size: 13px;"></span>
            <span id="stat-fail" style="color: #f44336; font-size: 13px;"></span>
        </div>

        <!-- Bảng lịch sử -->
        <div style="overflow-y: auto; flex: 1; padding: 0 8px;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="position: sticky; top: 0; background: #1e1d2e; z-index: 1;">
                        <th style="padding: 12px 16px; text-align: left; color: rgba(255,255,255,0.5);
                                   font-size: 12px; font-weight: 600; border-bottom: 1px solid #3a3850;">THỜI GIAN</th>
                        <th style="padding: 12px 16px; text-align: left; color: rgba(255,255,255,0.5);
                                   font-size: 12px; font-weight: 600; border-bottom: 1px solid #3a3850;">KHÁCH HÀNG</th>
                        <th style="padding: 12px 16px; text-align: left; color: rgba(255,255,255,0.5);
                                   font-size: 12px; font-weight: 600; border-bottom: 1px solid #3a3850;">CỔNG</th>
                        <th style="padding: 12px 16px; text-align: center; color: rgba(255,255,255,0.5);
                                   font-size: 12px; font-weight: 600; border-bottom: 1px solid #3a3850;">KQ</th>
                    </tr>
                </thead>
                <tbody id="lich-su-tbody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px;">
                            Chọn sự kiện để xem lịch sử
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
