<div class="toolbar">
    <div class="tb-left">
        <search-box placeholder="Tìm theo tên, email, SĐT..."></search-box>
        <select id="filter-status-customer">
            <option value="">Tất cả trạng thái</option>
            <option value="1">Đang hoạt động</option>
            <option value="0">Đã khóa</option>
        </select>
    </div>
    <div class="tb-right">
        <button class="add-btn" id="btn-export-customers">Xuất Excel</button>
    </div>
</div>

<div class="reusable-table-container">
    <table class="data-table">
        <thead>
        <tr>
            <th class="col-id">Mã KH</th>
            <th>Tên tài khoản</th>
            <th>Họ và tên</th>
            <th>Email</th>
            <th>Số điện thoại</th>
            <th style="text-align: center;">Trạng thái</th>
            <th class="col-actions">Thao tác</th>
        </tr>
        </thead>
        <tbody id="customer-table-body">
        </tbody>
    </table>
</div>

<div class="pagination" id="customer-pagination"></div>

<div id="customer-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h2 id="customer-modal-title">Thông tin Khách hàng</h2>
            <span class="close-modal-btn" id="close-customer-modal">&times;</span>
        </div>
        <div class="modal-body">
            <form id="customerForm">
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Mã Khách Hàng</label>
                        <input type="text" id="detail-ma-kh" readonly style="background-color: #e9ecef; cursor: not-allowed;">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>Tên tài khoản</label>
                        <input type="text" id="detail-ten-tk" readonly style="background-color: #e9ecef; cursor: not-allowed;">
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Họ</label>
                        <input type="text" id="detail-ho" readonly>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Tên</label>
                        <input type="text" id="detail-ten" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="detail-email" readonly>
                </div>

                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" id="detail-sdt" readonly>
                </div>

                <div class="form-group">
                    <label>Trạng thái tài khoản</label>
                    <select id="detail-trang-thai">
                        <option value="1">Đang hoạt động</option>
                        <option value="0">Khóa tài khoản</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-cancel" id="cancel-customer-btn">Đóng</button>
            <button type="button" class="btn-save" id="save-customer-btn" style="background-color: #007bff;">Lưu thay đổi</button>
        </div>
    </div>
</div>
