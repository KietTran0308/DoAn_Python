<!DOCTYPE html>

<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Hanken+Grotesk:wght@600&amp;family=Space+Grotesk:wght@500;700&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#004e5c",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "on-secondary-fixed": "#2c0051",
                        "tertiary-fixed": "#acedff",
                        "on-secondary-container": "#dfbcff",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#ddb8ff",
                        "primary": "#b9e4ff",
                        "on-background": "#e4e1ee",
                        "surface-dim": "#13121b",
                        "surface-container-highest": "#35343e",
                        "surface-container-lowest": "#0e0d16",
                        "on-secondary": "#490080",
                        "on-primary-fixed-variant": "#3323cc",
                        "inverse-surface": "#e4e1ee",
                        "outline": "#918fa1",
                        "primary-container": "#4f46e5",
                        "error": "#ffb4ab",
                        "on-primary": "#1d00a5",
                        "surface-tint": "#c3c0ff",
                        "primary-fixed": "#e2dfff",
                        "tertiary": "#4cd7f6",
                        "error-container": "#93000a",
                        "on-surface": "#e4e1ee",
                        "on-tertiary-fixed": "#001f26",
                        "inverse-primary": "#4d44e3",
                        "inverse-on-surface": "#302f39",
                        "on-error": "#690005",
                        "surface-container-low": "#1b1b24",
                        "outline-variant": "#464555",
                        "on-primary-fixed": "#0f0069",
                        "surface-container": "#1f1f28",
                        "surface-bright": "#393842",
                        "on-tertiary": "#003640",
                        "on-primary-container": "#dad7ff",
                        "surface-container-high": "#2a2933",
                        "tertiary-container": "#006a7c",
                        "on-tertiary-container": "#93e8ff",
                        "secondary": "#7CCDFF",
                        "on-secondary-fixed-variant": "#6800b4",
                        "background": "#13121b",
                        "secondary-fixed": "#f0dbff",
                        "secondary-container": "#7c03d3",
                        "surface": "#13121b",
                        "on-surface-variant": "#c7c4d8",
                        "surface-variant": "#35343e",
                        "primary-fixed-dim": "#c3c0ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "8px",
                        "gutter": "24px",
                        "section-gap": "120px",
                        "margin-desktop": "64px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro"],
                        "display-xl": ["Space Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-sm": ["Hanken Grotesk"],
                        "display-lg": ["Space Grotesk"],
                        "label-md": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-xl": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .focus-gradient-border:focus {
            outline: none;
            border-image: linear-gradient(to right, #e6f5ff, #7ccdff) 1;
            box-shadow: 0 0 15px rgba(195, 192, 255, 0.3);
        }

        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(19, 18, 27, 0.4);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary selection:text-on-primary">
<main class="flex min-h-screen overflow-hidden">
    <!-- Left Side: Immersive Graphic (Viet POP Space Aesthetic) -->
    <section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-surface-container-lowest">
        <div class="absolute inset-0 z-0">
            <img alt="Viet POP Space Aesthetic"
                 class="w-full h-full object-cover opacity-60 grayscale hover:grayscale-0 transition-all duration-1000 ease-in-out"
                 data-alt="A cinematic digital art piece showcasing a futuristic Vietnamese pop star silhouette performing in a celestial stadium. The sky is a deep nebula of indigo and violet, with glowing neon geometric shapes reminiscent of traditional lanterns floating like planets. Sharp light beams in cyan and magenta cut through a misty atmosphere, creating a high-energy, sophisticated space-opera aesthetic. The composition uses extreme negative space to emphasize the orbital, ethereal mood of the NOVAENTRY brand."
                 src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1kYgm14VVSnwD9Es0PglJTAj3M70-9EUCeNR-kdN9MzQk_ingVmp8oSsc3cTNzfl5gEUN6_-2M1-RFV9HU02fpEwHsLAuUAaFsG-JHjH_EDP_ZJcpAAucTFgQR-GENIpcPip3mxReQ_xUK7eBoE9c1HPrPr_ODXfTmC07I5padtw1aUwAmrXLy7fC0nYT2KxH-7NyExlIALE-473FR-ofhcqO5E5OCLG8wZ0-D0r1XmImJTgkPMuJhR3DrFxpH7Xn7w9SnB_E70xx"/>
            <div class="absolute inset-0 bg-gradient-to-tr from-background via-transparent to-primary/10"></div>
            <div class="absolute bottom-20 left-16 z-10 max-w-md">
                <h2 class="font-display-xl text-display-xl text-primary mb-4">VŨ TRỤ<br/>ÂM NHẠC.</h2>
                <p class="font-body-lg text-body-lg text-on-surface-variant">Kết nối cộng đồng yêu âm nhạc và nghệ thuật
                    qua những trải nghiệm số hóa đỉnh cao.</p>
            </div>
        </div>
        <!-- Floating Decorative Elements -->
        <div class="absolute top-1/4 right-1/4 w-32 h-32 rounded-full border border-primary/20 blur-xl animate-pulse"></div>
        <div class="absolute bottom-1/3 left-1/2 w-64 h-64 rounded-full bg-secondary/5 blur-[100px]"></div>
    </section>
    <!-- Right Side: Minimalist Login Form -->
    <section
            class="w-full lg:w-1/2 flex flex-col justify-center items-center px-gutter md:px-margin-desktop py-12 relative">
        <div class="w-full max-w-md space-y-12">
            <!-- Brand Anchor -->
            <div class="flex flex-col items-center lg:items-start">
                <span class="font-display-lg text-display-lg tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary mb-2">NOVAENTRY</span>
                <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Digital
                    Experience Nebula</p>
            </div>
            <!-- Registration Form -->
            <form class="space-y-6">
                <div class="space-y-4">
                    <!-- Full Name -->
                    <div class="group">
                        <label class="block font-label-md text-label-md text-on-surface-variant uppercase mb-2"
                               for="name">Họ và tên</label>
                        <div class="relative input-glow transition-all duration-300">
                            <input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 font-body-md text-body-md text-white focus:ring-0 focus:border-tertiary transition-all placeholder:text-surface-variant"
                                   id="name" placeholder="Nguyễn Văn A" type="text"/>
                        </div>
                    </div>
                    <div class="group">
                        <label class="font-label-md text-label-md text-on-surface" for="username">Tên đăng nhập</label>
                        <input class="w-full bg-surface text-on-surface placeholder:text-on-surface-variant/50 rounded-lg border-outline-variant focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-all"
                               id="username" placeholder="Nhập tên đăng nhập (Không dấu, viết liền)" required
                               type="text"/>
                    </div>
                    <!-- Email -->
                    <div class="group">
                        <label class="block font-label-md text-label-md text-on-surface-variant uppercase mb-2"
                               for="email">Email</label>
                        <div class="relative input-glow transition-all duration-300">
                            <input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 font-body-md text-body-md text-white focus:ring-0 focus:border-tertiary transition-all placeholder:text-surface-variant"
                                   id="email" placeholder="nova@entry.vn" type="email"/>
                        </div>
                    </div>
                    <!-- Phone -->
                    <div class="group">
                        <label class="block font-label-md text-label-md text-on-surface-variant uppercase mb-2"
                               for="phone">Số điện thoại</label>
                        <div class="relative input-glow transition-all duration-300">
                            <input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 font-body-md text-body-md text-white focus:ring-0 focus:border-tertiary transition-all placeholder:text-surface-variant"
                                   id="phone" placeholder="0901 234 567" type="tel"/>
                        </div>
                    </div>
                    <!-- Password -->
                    <div class="group">
                        <label class="block font-label-md text-label-md text-on-surface-variant uppercase mb-2"
                               for="password">Mật khẩu</label>
                        <div class="relative input-glow transition-all duration-300">
                            <input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 font-body-md text-body-md text-white focus:ring-0 focus:border-tertiary transition-all placeholder:text-surface-variant"
                                   id="password" placeholder="••••••••" type="password"/>
                        </div>
                    </div>
                    <!-- Confirm Password -->
                    <div class="group">
                        <label class="block font-label-md text-label-md text-on-surface-variant uppercase mb-2"
                               for="confirm-password">Xác nhận mật khẩu</label>
                        <div class="relative input-glow transition-all duration-300">
                            <input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 font-body-md text-body-md text-white focus:ring-0 focus:border-tertiary transition-all placeholder:text-surface-variant"
                                   id="confirm-password" placeholder="••••••••" type="password"/>
                        </div>
                    </div>
                </div>
                <!-- Terms checkbox -->
                <div class="flex items-center gap-3 py-2">
                    <input class="w-5 h-5 rounded border-outline-variant bg-transparent text-primary focus:ring-primary/20"
                           id="terms" type="checkbox"/>
                    <label class="font-body-md text-on-surface-variant text-sm" for="terms">
                        Tôi đồng ý với <span
                            class="text-tertiary cursor-pointer hover:underline">Điều khoản dịch vụ</span> và <span
                            class="text-tertiary cursor-pointer hover:underline">Chính sách bảo mật</span>.
                    </label>
                </div>
                <!-- Action Button -->
                <div class="pt-4">
                    <button class="w-full py-4 rounded-lg bg-gradient-to-r from-[#E6F5FF] to-[#7CCDFF] text-[#000] font-label-md text-label-md tracking-widest hover:brightness-110 hover:shadow-[0_0_30px_rgba(79,70,229,0.4)] transition-all duration-300 uppercase"
                            type="submit">
                        ĐĂNG KÝ
                    </button>
                </div>
                <!-- Navigation -->
                <div class="text-center pt-8">
                    <p class="font-body-md text-on-surface-variant">
                        Đã có tài khoản?
                        <a class="ml-1 text-tertiary font-bold hover:text-tertiary-fixed transition-colors" href="Login.html">Đăng
                            nhập ngay</a>
                    </p>
                </div>
            </form>
            <!-- Footer Disclaimer -->
            <div class="mt-24 text-center">
                <p class="text-surface-variant font-label-md text-[10px] uppercase tracking-[0.2em]">
                    © 2024 NOVAENTRY • SECURED CONNECTION
                </p>
            </div>
        </div>
    </section>
</main>
<script src="register.js"></script>
</body>
</html>
