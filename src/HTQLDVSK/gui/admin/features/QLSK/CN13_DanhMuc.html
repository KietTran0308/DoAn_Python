<div class="toolbar">
    <div class="tb-left">
        <search-box placeholder="Tìm theo tên danh mục..."></search-box>
    </div>
    <div class="tb-right">
        <button class="add-btn" id="btn-open-add-category">+ Thêm Danh Mục</button>
    </div>
</div>

<div style="flex-grow: 1; overflow-y: auto; padding-top: 15px;">
    <div id="category-grid-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; align-content: start;">
    </div>
</div>

<div id="category-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h2 id="category-modal-title">Thêm danh mục</h2>
            <span class="close-modal-btn" id="close-category-modal">&times;</span>
        </div>
        <div class="modal-body">
            <form id="categoryForm">
                <div class="form-group">
                    <label>Tên danh mục <span class="required">*</span></label>
                    <input type="text" id="TEN_DM" required placeholder="VD: Âm nhạc">
                </div>
                <div class="form-group">
                    <label>Link hình ảnh (URL)</label>
                    <input type="text" id="IMAGE_URL" placeholder="VD: https://link-anh.com/music.jpg">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-cancel" id="cancel-category-btn">Hủy bỏ</button>
            <button type="button" class="btn-save" id="save-category-btn">Lưu</button>
        </div>
    </div>
</div>

<pagination-box id="category-pagination"></pagination-box>
